tasks:
  setupCredentials:
    name: Setup AI tool credentials
    description: >
      Installs Claude Code CLI and configures credentials for all AI tools:
      Claude Code, Continue.dev, Roo Code, and GitHub Copilot CLI.
      Runs automatically after the devcontainer starts.
    command: |
      npm install -g @anthropic-ai/claude-code 2>&1 | tee -a /workspaces/setup.log
      bash /workspaces/fhir-agent/.devcontainer/scripts/setup-credentials.sh 2>&1 | tee -a /workspaces/setup.log
    triggeredBy:
      - postDevcontainerStart
