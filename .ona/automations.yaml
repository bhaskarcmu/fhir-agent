tasks:
  setupCredentials:
    name: Setup AI tool credentials
    description: >
      Installs Google Cloud CLI, Claude Code CLI, and configures credentials
      for all AI tools: Claude Code, Continue.dev, Roo Code, and GitHub Copilot CLI.
      Runs automatically after the devcontainer starts.
    command: |
      # Install Google Cloud CLI (moved here from devcontainer features to keep
      # the image build fast — gcloud is ~500MB and was causing build timeouts)
      if ! command -v gcloud &> /dev/null; then
        echo "=== Installing Google Cloud CLI ===" | tee -a /workspaces/setup.log
        curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg \
          | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" \
          | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list > /dev/null
        sudo apt-get update -q && sudo apt-get install -y google-cloud-cli google-cloud-sdk-gke-gcloud-auth-plugin \
          && echo "gcloud: installed" | tee -a /workspaces/setup.log \
          || echo "gcloud: install failed" | tee -a /workspaces/setup.log
      else
        echo "gcloud: already installed" | tee -a /workspaces/setup.log
      fi

      # Install Claude Code CLI (requires Node, installed via devcontainer feature)
      npm install -g @anthropic-ai/claude-code 2>&1 | tee -a /workspaces/setup.log

      # Configure credentials for all AI tools
      bash /workspaces/fhir-agent/.devcontainer/scripts/setup-credentials.sh 2>&1 | tee -a /workspaces/setup.log
    triggeredBy:
      - postDevcontainerStart
