# Kubernetes Service for fhir-service.
#
# ClusterIP — reachable only within the cluster.
# Kong Ingress Controller routes external traffic here via kong-ingress.yaml.
#
# The service name "fhir-service" must match the backend.service.name in
# gateway/kong/kong-ingress.yaml exactly.
#
# Apply with: kubectl apply -f fhir-service/k8s/service.yaml -n fhir
apiVersion: v1
kind: Service
metadata:
  name: fhir-service
  namespace: fhir
  labels:
    app: fhir-service
spec:
  type: ClusterIP
  selector:
    # Must match the pod labels in deployment.yaml.
    app: fhir-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
