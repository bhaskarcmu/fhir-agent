# Synthea generation configuration for fhir-agent.
#
# Used by data/scripts/generate.sh when running Synthea locally.
# Reference: https://github.com/synthetichealth/synthea/wiki/Common-Configuration
#
# ─────────────────────────────────────────────────────────────────────────────
# Output
# ─────────────────────────────────────────────────────────────────────────────

# Write output relative to the repo root (generate.sh sets the working directory).
exporter.baseDirectory = ./data/sample/

# Only export FHIR R4 — disable all other formats.
exporter.fhir.export = true
exporter.fhir_stu3.export = false
exporter.fhir_dstu2.export = false
exporter.ccda.export = false
exporter.csv.export = false
exporter.cpcds.export = false
exporter.text.export = false
exporter.symptoms.mode = 0

# ─────────────────────────────────────────────────────────────────────────────
# FHIR bundle type — CRITICAL
# ─────────────────────────────────────────────────────────────────────────────
# transaction_bundle = true produces bundles of type "transaction".
# HAPI FHIR processes transaction bundles atomically and resolves temporary
# internal references (e.g. MedicationRequest.subject → Patient) correctly.
#
# transaction_bundle = false produces "collection" bundles where internal
# references are unresolved UUIDs. Loading collection bundles into HAPI
# results in broken references — get_medications(patient_id) returns nothing
# even though the MedicationRequest rows exist.
#
# Always keep this true.
exporter.fhir.transaction_bundle = true

# ─────────────────────────────────────────────────────────────────────────────
# FHIR profile
# ─────────────────────────────────────────────────────────────────────────────
# US Core Implementation Guide profiles — realistic for US EHR context and
# consistent with the fhir-service R4 configuration.
exporter.fhir.use_us_core_ig = true

# ─────────────────────────────────────────────────────────────────────────────
# Clinical history depth
# ─────────────────────────────────────────────────────────────────────────────
# 5 years provides enough encounter, medication, and condition history for
# meaningful triage scenarios without generating excessively large bundles.
# Increase to 10+ for longitudinal analysis use cases.
exporter.years_of_history = 5

# ─────────────────────────────────────────────────────────────────────────────
# One file per patient
# ─────────────────────────────────────────────────────────────────────────────
# Each patient gets its own bundle file. This allows load.py to report
# per-patient success/failure and retry individual patients if needed.
exporter.fhir.bulk_data = false
