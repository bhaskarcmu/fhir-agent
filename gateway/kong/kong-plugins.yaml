# Kong plugin definitions for the FHIR service API gateway.
#
# These are Kubernetes custom resources (KongPlugin) read by the Kong
# Ingress Controller. Attaching them to an Ingress (via annotation) applies
# them to every request that passes through that Ingress.
#
# Apply with: kubectl apply -f kong-plugins.yaml -n fhir

---
# ---------------------------------------------------------------------------
# Plugin 1: fhir-key-auth
# ---------------------------------------------------------------------------
# Requires every incoming request to carry a valid API key in one of:
#   - Header:      apikey: <key>
#   - Query param: ?apikey=<key>
#
# Requests without a valid key receive HTTP 401 Unauthorized.
# Keys are provisioned via KongConsumer + Secret (see kong-consumers.yaml)
# or dynamically via the create-key.sh script.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: fhir-key-auth
  namespace: fhir
plugin: key-auth
config:
  # Accept the key in the "apikey" header or query parameter.
  key_names:
    - apikey
  # Do not expose the key to the upstream fhir-service — strip it from
  # the forwarded request so Spring Boot never sees it.
  hide_credentials: true

---
# ---------------------------------------------------------------------------
# Plugin 2: fhir-rate-limit
# ---------------------------------------------------------------------------
# Enforces two independent limits:
#
#   second: 10   — max 10 requests per second (DoS / burst protection)
#   day:    1000 — max 1000 requests per day  (usage quota)
#
# Both limits are tracked per consumer (identified by their API key).
# A consumer that exceeds either limit receives HTTP 429 Too Many Requests
# with a Retry-After header.
#
# policy: local — counters are stored in Kong's local memory.
# This is accurate for a single Kong pod. If you scale Kong to multiple
# replicas later, switch to policy: redis and add a Redis deployment.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: fhir-rate-limit
  namespace: fhir
plugin: rate-limiting
config:
  second: 10
  day: 1000
  # policy: cluster writes counters to kongdb (Neon) on every request.
  # This makes usage data visible via SQL in the Neon dashboard:
  #   SELECT identifier, period_type, value FROM ratelimiting_metrics ORDER BY value DESC;
  #
  # Upgrade path: switch to policy: redis when Kong scales beyond 1 replica.
  # With policy: local, counters are per-pod and not shared across replicas.
  # With policy: cluster, Neon handles the shared state at the cost of one
  # DB write per request — negligible at current scale.
  policy: cluster
  # Return rate limit headers so clients can see their remaining quota:
  #   X-RateLimit-Remaining-Second, X-RateLimit-Remaining-Day
  hide_client_headers: false
  # When the limit is exceeded, return 429 (not 503).
  error_code: 429
  error_message: "API rate limit exceeded. Retry after the indicated period."

---
# ---------------------------------------------------------------------------
# Plugin 3: fhir-request-log (global)
# ---------------------------------------------------------------------------
# Writes a structured JSON log line to stdout for every request through Kong.
# GKE captures stdout as structured logs in Cloud Logging automatically —
# no additional log infrastructure needed.
#
# Each log entry contains:
#   consumer.username  — which API client made the request
#   request.method     — GET, POST, PUT, DELETE
#   request.uri        — e.g. /fhir/Patient/123
#   response.status    — 200, 401, 429, etc.
#   response.latency   — total time including upstream fhir-service
#   started_at         — Unix timestamp (ms)
#
# This is a KongClusterPlugin (cluster-scoped) rather than a KongPlugin
# (namespace-scoped). It applies globally to ALL traffic through Kong —
# not just the fhir-service Ingress. This means any future service added
# behind Kong is automatically logged without additional configuration.
#
# Apply with: kubectl apply -f kong-plugins.yaml
# (No namespace flag needed — ClusterPlugin is cluster-scoped)
---
# ---------------------------------------------------------------------------
# Plugin 4: fhir-prometheus (global)
# ---------------------------------------------------------------------------
# Enables the built-in Prometheus metrics endpoint on Kong port 8100.
# Exposes per-consumer, per-route, and per-service metrics in Prometheus
# exposition format. No external dependency — built into Kong.
#
# Access manually:
#   kubectl port-forward svc/kong-kong-metrics 8100:8100 -n kong
#   curl http://localhost:8100/metrics
#
# Activated automatically by GKE Managed Prometheus via the ServiceMonitor
# declared in kong-values.yaml (enable Managed Prometheus in GKE console).
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: fhir-prometheus
  annotations:
    kubernetes.io/ingress.class: "kong"
  labels:
    global: "true"
plugin: prometheus
config:
  status_code_metrics: true
  latency_metrics: true
  bandwidth_metrics: true
  upstream_health_metrics: true

---
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: fhir-request-log
  # Global annotation makes this plugin apply to every request through Kong
  # without needing to attach it to any specific Ingress.
  annotations:
    kubernetes.io/ingress.class: "kong"
  labels:
    global: "true"
plugin: file-log
config:
  # Write to stdout — GKE captures this as structured Cloud Logging entries.
  path: /dev/stdout
  reopen: false
