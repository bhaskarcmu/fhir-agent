# Kong Ingress for fhir-service
#
# This Ingress resource does two things:
#   1. Tells Kong to route all incoming HTTP traffic to the fhir-service
#      Kubernetes Service (port 8080) in the fhir namespace.
#   2. Attaches the fhir-key-auth and fhir-rate-limit plugins to every
#      request that matches this Ingress, via the annotation below.
#
# Traffic flow:
#   Client → Kong proxy (ClusterIP :80) → fhir-service:8080 → Spring Boot
#
# The client must include a valid API key header on every request:
#   curl -H "apikey: <your-key>" http://<kong-proxy>/fhir/metadata
#
# Apply with: kubectl apply -f kong-ingress.yaml -n fhir
#
# Prerequisites:
#   - Kong Ingress Controller running in the kong namespace
#   - fhir-service Kubernetes Service exists in the fhir namespace
#   - kong-plugins.yaml has been applied (fhir-key-auth, fhir-rate-limit exist)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fhir-service-ingress
  namespace: fhir
  annotations:
    # Route this Ingress through Kong (not the default GKE Ingress controller).
    kubernetes.io/ingress.class: "kong"

    # Attach plugins — comma-separated list of KongPlugin resource names.
    # Order matters: key-auth runs first (reject unauthenticated requests
    # before rate-limiting counts them).
    konghq.com/plugins: "fhir-key-auth,fhir-rate-limit"

    # strip-path is intentionally NOT set (defaults to false).
    # Spring Boot's HAPI FHIR servlet is mounted at /fhir/* (see Application.java).
    # Kong must forward the full path including /fhir — do not strip it.
spec:
  rules:
    - http:
        paths:
          - path: /fhir
            pathType: Prefix
            backend:
              service:
                # Name of the Kubernetes Service for fhir-service.
                # Adjust if your Service is named differently.
                name: fhir-service
                port:
                  number: 8080

---
# KongIngress — fine-tunes how Kong handles requests to fhir-service.
# This is a Kong-specific extension to the standard Ingress resource.
apiVersion: configuration.konghq.com/v1
kind: KongIngress
metadata:
  name: fhir-service-kong-ingress
  namespace: fhir
proxy:
  # Connect timeout to fhir-service (ms). HAPI FHIR can be slow on cold start.
  connect_timeout: 10000
  # Read/write timeout (ms). FHIR searches can take a few seconds.
  read_timeout: 60000
  write_timeout: 60000
upstream:
  # Round-robin load balancing across fhir-service pods.
  algorithm: round-robin
  # Mark a pod as unhealthy after 3 consecutive failures.
  healthchecks:
    passive:
      unhealthy:
        http_failures: 3
