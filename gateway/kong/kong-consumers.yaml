# Kong consumers for the FHIR service API gateway.
#
# NO CONSUMERS ARE DEFINED IN THIS FILE.
#
# API keys are secrets. Storing them in a committed YAML file — even as
# placeholders — creates a risk of accidental exposure and establishes a
# bad pattern. Consumers and keys are provisioned dynamically after
# deployment using the Kong Admin API via create-key.sh.
#
# ─────────────────────────────────────────────────────────────────────────
# HOW TO PROVISION YOUR FIRST CONSUMER AFTER DEPLOYMENT
# ─────────────────────────────────────────────────────────────────────────
#
# 1. Ensure Kong is running and port-forward the Admin API:
#      kubectl port-forward svc/kong-kong-admin 8001:8001 -n kong
#
# 2. Run create-key.sh with the name of your first client:
#      ./gateway/tools/create-key.sh mcp-agent
#
#    The script will print:
#      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#        Consumer : mcp-agent
#        API Key  : a3f8c2e1d4b7...
#      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 3. STORE THE KEY IMMEDIATELY in a password manager or GCP Secret Manager.
#    Kong stores only a hash of the key in kongdb — the plaintext is shown
#    ONCE and cannot be retrieved again. If lost, generate a new key by
#    running create-key.sh again (the old key is not recoverable).
#
# 4. Give the key to the client. They send it on every request:
#      curl -H "apikey: <key>" https://<your-gateway>/fhir/metadata
#
# ─────────────────────────────────────────────────────────────────────────
# SUGGESTED CONSUMERS FOR THIS PLATFORM
# ─────────────────────────────────────────────────────────────────────────
#
# Run create-key.sh once for each of these after deployment:
#
#   ./gateway/tools/create-key.sh mcp-agent       # LLM orchestration layer
#   ./gateway/tools/create-key.sh triage-service  # Drug-allergy risk service
#   ./gateway/tools/create-key.sh dev-local       # Local development testing
#
# ─────────────────────────────────────────────────────────────────────────
# KEY ROTATION
# ─────────────────────────────────────────────────────────────────────────
#
# Rotate keys quarterly using rotate-key.sh:
#   ./gateway/tools/rotate-key.sh mcp-agent
#
# See gateway/README.md for the full key management guide.
