# Kong Gateway Helm values
# Chart: kong/kong v3.1.0  (Kong Gateway 3.9)
# Deployed to namespace: kong
#
# Database: Neon serverless PostgreSQL (kongdb)
# Connection credentials are NOT stored here — they are read from a
# Kubernetes Secret named "kong-db-secret" that you create manually
# before running helm install. See gateway/README.md.

# ---------------------------------------------------------------------------
# 1. DEPLOYMENT
# ---------------------------------------------------------------------------
# Run a single Kong pod. Scale up when traffic demands it.
replicaCount: 1

image:
  repository: kong
  tag: "3.9"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# 2. DATABASE — Neon PostgreSQL (external)
# ---------------------------------------------------------------------------
# Disable the bundled Bitnami PostgreSQL subchart — we use Neon instead.
postgresql:
  enabled: false

# Kong reads its configuration from the kongdb database on Neon.
# All pg_* values are injected from the "kong-db-secret" Secret so that
# credentials never appear in this file or in the repo.
env:
  database: postgres
  router_flavor: traditional
  nginx_worker_processes: "2"
  proxy_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_access_log: /dev/stdout
  admin_error_log: /dev/stderr

  # PostgreSQL connection — values come from the Secret, not hardcoded here.
  # The Secret keys map to Kong environment variables via valueFrom.
  pg_host:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: pg_host
  pg_port:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: pg_port
  pg_database:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: pg_database
  pg_user:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: pg_user
  pg_password:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: pg_password
  # Neon requires SSL. VERIFY_FULL validates the server certificate.
  pg_ssl: "on"
  pg_ssl_verify: "on"
  # Neon SNI workaround: Kong 3.9 bundles an older libpq that doesn't send SNI.
  # The pg_password secret must be prefixed with "endpoint=<endpoint-id>;"
  # so Neon can route the connection correctly. See: https://neon.tech/sni
  # The secret is created with: endpoint=ep-restless-resonance-amqcyrmq;<password>
  # TODO: Remove this workaround when Kong upgrades its bundled libpq to v14+.
  #       Monitor: https://github.com/Kong/kong/releases

# ---------------------------------------------------------------------------
# 3. DATABASE MIGRATION (kong migrations bootstrap / up)
# ---------------------------------------------------------------------------
# On first install, Kong must run "kong migrations bootstrap" to create its
# schema in kongdb. The migrations job runs as a pre-install Helm hook.
migrations:
  preUpgrade: true
  postUpgrade: true
  # The migration job also needs the DB credentials.
  env:
    pg_host:
      valueFrom:
        secretKeyRef:
          name: kong-db-secret
          key: pg_host
    pg_port:
      valueFrom:
        secretKeyRef:
          name: kong-db-secret
          key: pg_port
    pg_database:
      valueFrom:
        secretKeyRef:
          name: kong-db-secret
          key: pg_database
    pg_user:
      valueFrom:
        secretKeyRef:
          name: kong-db-secret
          key: pg_user
    pg_password:
      valueFrom:
        secretKeyRef:
          name: kong-db-secret
          key: pg_password
    pg_ssl: "on"
    pg_ssl_verify: "on"

# ---------------------------------------------------------------------------
# 4. INGRESS CONTROLLER
# ---------------------------------------------------------------------------
# The Kong Ingress Controller (KIC) watches Kubernetes Ingress resources and
# KongPlugin/KongConsumer custom resources, then programs Kong accordingly.
# This is what makes "kubectl apply -f kong-ingress.yaml" work.
ingressController:
  enabled: true
  # KIC needs to call Kong's Admin API to push configuration.
  # installCRDs installs the KongPlugin, KongConsumer, etc. CRD definitions.
  installCRDs: false   # managed separately via "helm install --set crds=skip"
                       # or "kubectl apply -f crds/" — see README

# ---------------------------------------------------------------------------
# 5. PROXY SERVICE (incoming FHIR traffic)
# ---------------------------------------------------------------------------
# ClusterIP means the proxy is only reachable inside the cluster.
# You access it via kubectl port-forward during development, and via
# a GKE Ingress / LoadBalancer in production.
proxy:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
  tls:
    enabled: false   # TLS termination handled by GKE Ingress in production

# ---------------------------------------------------------------------------
# 6. ADMIN API SERVICE (used by create-key.sh and KIC)
# ---------------------------------------------------------------------------
# ClusterIP — never exposed outside the cluster.
# Access via: kubectl port-forward svc/kong-kong-admin 8001:8001 -n kong
admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
  tls:
    enabled: false

# ---------------------------------------------------------------------------
# 7. PROMETHEUS METRICS
# ---------------------------------------------------------------------------
# The prometheus plugin makes Kong expose a /metrics endpoint on port 8100
# in Prometheus exposition format. Metrics include:
#   kong_http_requests_total    — requests by consumer, route, status code
#   kong_latency_ms             — latency histogram (Kong + upstream)
#   kong_bandwidth_bytes        — bytes in/out per consumer
#   kong_upstream_health        — health status of fhir-service pods
#
# The /metrics endpoint is available immediately after deployment:
#   kubectl port-forward svc/kong-kong-metrics 8100:8100 -n kong
#   curl http://localhost:8100/metrics
#
# The serviceMonitor is a Prometheus Operator custom resource. If no
# Prometheus Operator is running in the cluster, it is silently ignored —
# no errors, no impact on Kong. When you enable Google Cloud Managed
# Prometheus in GKE (one checkbox in the GKE console), it automatically
# discovers this ServiceMonitor and begins scraping. No further config needed.
# The prometheus plugin is a built-in Kong plugin — it does not need to be
# declared here. It is enabled by applying a KongClusterPlugin resource
# (see kong-plugins.yaml). The serviceMonitor below tells Prometheus Operator
# where to scrape the /metrics endpoint Kong exposes on port 8100.
serviceMonitor:
  enabled: true
  # Scrape interval — how often Prometheus polls /metrics
  interval: 30s
  namespace: kong
  # Labels that GKE Managed Prometheus uses to discover ServiceMonitors
  labels:
    release: kong

# ---------------------------------------------------------------------------
# 8. KONG MANAGER (web UI)
# ---------------------------------------------------------------------------
# Kong Manager is the open-source web UI for viewing and managing Kong
# configuration: consumers, keys, plugins, routes, services, upstreams.
#
# Cost: zero — included in the Apache 2.0 open-source distribution.
#
# Access after deployment:
#   kubectl port-forward svc/kong-kong-manager 8002:8002 -n kong
#   Then in VS Code: Ctrl+Shift+P → "Simple Browser: Show" → http://localhost:8002
#
# Note: In Kong 3.x open-source, some edit operations in Manager are
# read-only (Kong Inc. pushes editing to their Konnect SaaS product).
# All viewing and debugging functionality works fully.
manager:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 8002
    containerPort: 8002
  tls:
    enabled: false

# ---------------------------------------------------------------------------
# 9. RESOURCE LIMITS
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
